<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moda e Esporte</title>
</head>
<body>

    <h1>Formulário de Estilo e Esporte</h1>
    <p>Responda para ajudar no mapeamento de tendências urbanas.</p>

    <p>
        <a href="index.html">🏡 Início/Textos</a> |
        <a href="cultura.html">🎶 Música e Culinária</a> |
        <a href="estilo.html">⚽ Moda e Esporte</a>
    </p>

    <hr>

    <div>
        <h2>Formulário de Cadastro de Tendências</h2>

        <form>

            <p>
                <label for="nome">Nome Completo:</label><br>
                <input type="text" id="nome" name="nome" placeholder="Ex.: Mc Pipinho">
            </p>

            <p>
                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" placeholder="nome@provedor.com">
            </p>

            <p>
                <label for="data-nasc">Data de Nascimento:</label><br>
                <input type="date" id="data-nasc" name="data-nasc">
            </p>

            <p>
                <label>Quais esportes e atividades de lazer você pratica? (Marque quantos quiser)</label><br>

                <input type="checkbox" id="esp1" name="esportes" value="Futebol">
                <label for="esp1">Futebol de Campo ou Quadra</label><br>

                <input type="checkbox" id="esp2" name="esportes" value="Basquete">
                <label for="esp2">Basquete</label><br>

                <input type="checkbox" id="esp3" name="esportes" value="Vôlei">
                <label for="esp3">Vôlei</label><br>

                <input type="checkbox" id="esp4" name="esportes" value="Natação">
                <label for="esp4">Natação</label><br>

                <input type="checkbox" id="esp5" name="esportes" value="Queimada">
                <label for="esp5">Queimada</label><br>

                <input type="checkbox" id="esp6" name="esportes" value="Handebol">
                <label for="esp6">Handebol</label><br>

                <input type="checkbox" id="esp7" name="esportes" value="Skate">
                <label for="esp7">Skate</label><br>
            </p>

            <p>
                <label for="marca">Qual marca de roupa ou tênis você gosta?</label><br>

                <input list="lista-marcas" id="marca" name="marca" placeholder="Digite ou selecione...">

                <datalist id="lista-marcas">
                    <option value="Nike">
                    <option value="Adidas">
                    <option value="Puma">
                    <option value="Reebok">
                    <option value="New Balance">
                    <option value="Vans">
                    <option value="Converse">
                </datalist>
            </p>

            <p>
                label for="instituição"> Onde você foca seus estudos atualmente?</label><br>
                <select id="instituição" name="instituição">
                    <option value="">Selecione...</option>
                    <option value="Ensino Fundamental">Ensino Fundamental</option>
                    <option value="Ensino Médio">Ensino Médio</option>
                    <option value="Ensino Técnico">Ensino Técnico</option>
                    <option value="Ensino Superior">Ensino Superior</option>
                    <option value="Pós-Graduação">Pós-Graduação</option>
            </p>


        </form>
    </div>

</body>
</html>
